        <main>
            <div class="container">
    <h2 style="color: #A1E3D8; margin-top: 30px;">Contact Us</h2>
    <form id="contactForm" onsubmit="return validateForm()">
        <label>Full Name:</label>
        <input type="text" id="name" placeholder="Enter your name">

        <label>Email:</label>
        <input type="email" id="email" placeholder="Email Address">

        <label>Inquiry Type:</label>
        <select id="subject">
            <option value="">Select an option</option>
            <option value="build">Custom Build Quote</option>
            <option value="support">Technical Support</option>
            <option value="parts">Parts Availability</option>
        </select>

        <label>Urgency:</label>
        <div class="radio-group">
            <input type="radio" name="urgency" value="low"> Low
            <input type="radio" name="urgency" value="high"> High
        </div>

        <label>Message:</label>
        <textarea id="message" rows="5"></textarea>

        <button type="submit" class="btn-primary">Send Message</button>
    </form>
    <div id="error-message" style="color: #ff4d4d; margin-top: 10px;"></div>
</div>
